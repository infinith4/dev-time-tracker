name: Publish cli-tracker

on:
  push:
    branches: [main]
    paths:
      - 'cli-tracker/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli-tracker
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm test

      - run: npm run build

      - run: npm publish --provenance --access public
